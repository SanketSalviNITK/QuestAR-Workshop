<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestAR - Custom Marker</title>
    
    <!-- Robust A-Frame + MindAR Bundle -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="../session2/style.css">
    <style>
        body { margin: 0; overflow: hidden; background: #050508; font-family: 'Inter', sans-serif; }
        
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        #ui-layer * { pointer-events: auto; }

        /* Ensure the AR canvas doesn't cover our UI */
        .a-canvas {
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="status-bar">
            <div class="score-pill">Gems: <span id="score">0</span></div>
        </div>

        <div id="hint" class="hint-box" style="align-self: center; margin-bottom: 20px;">
            <p>Scan your custom logo to find the treasure!</p>
        </div>
    </div>

    <!-- AR Scene -->
    <a-scene 
        mindar-image="imageTargetSrc: ../assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- The Custom Marker Anchor -->
        <a-entity mindar-image-target="targetIndex: 0" id="gem-anchor">
            <!-- The 3D Gem -->
            <a-octahedron 
                id="gem"
                position="0 0 0" 
                radius="0.3"
                material="color: #00f2ff; metalness: 0.8; roughness: 0.2; emissive: #003333;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
            </a-octahedron>
        </a-entity>
    </a-scene>

    <script>
        let collected = false;
        const scoreEl = document.getElementById('score');
        const hintEl = document.querySelector('#hint p');
        const gem = document.getElementById('gem');
        const anchor = document.getElementById('gem-anchor');

        // Interaction Logic
        window.addEventListener('click', () => {
            // A-Frame check for visibility
            if (anchor.getAttribute('visible') === true && !collected) {
                collected = true;
                scoreEl.innerText = "1";
                hintEl.innerText = "Gem Collected! Great job!";
                gem.setAttribute('visible', 'false');
                console.log("Gem Collected!");
            }
        });

        // Event Listeners for feedback
        anchor.addEventListener("targetFound", event => {
            if (!collected) hintEl.innerText = "Logo Detected! Tap to collect!";
        });

        anchor.addEventListener("targetLost", event => {
            if (!collected) hintEl.innerText = "Scan your custom logo...";
        });
    </script>
</body>
</html>
